<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AGA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas></canvas>
    <main>
        <div class="hand hidden"><img src="hand2.png" alt="HAND" id="hand"></div>
        <div class="pointsDiv">
            <h2 id="points">0</h2>
        </div>
        <div class="aga">
            <img src="aga.png" alt="aga" onclick="aga()" id="aga">
        </div>
        <div class="upgrades">
            <div class="upgrade" onclick="UpMulti(10, 1, this)">
                <img src="right-hand-pointer-black-icon.svg" alt="hand">
                <div class="info">
                    <h3>MORE AGAs</h3>
                    <p>10ags</p>
                </div>
            </div>
            <div class="upgrade" onclick="AddClicker(10, 1, this)">
                <img src="right-hand-pointer-black-icon.svg" alt="hand">
                <div class="info">
                    <h3>MORE AGAs</h3>
                    <p>10ags</p>
                </div>
            </div>
            <div class="upgrade">
                <h3>MORE AGAs</h3>
                <p>10ags</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AGA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas></canvas>
    <main>
        <div class="aga">
            <div class="gradient"></div>
            <div class="hand hidden"><img src="Assets/hand.png" alt="hand" id="hand"></div>
            <div class="hammer"><img src="Assets/hammer.png" alt="hammer"></div>
            <img src="Assets/aga.png" alt="aga" onclick="aga()" id="aga">
            <img src="Assets/fireIcon.svg" alt="fire" id="fire">
        </div>
        <div class="upgrades">
            <!-- EXAMPLE
            <div class="upgrade" onclick="UpMulti(10, 1, this)">
                <img src="handIcon.svg" alt="hand">
                <div class="info">
                    <h3>MORE AGAs</h3>
                    <p>10ags</p>
                </div>
            </div>
            -->
        </div>
        <div class="pointsDiv">
            <p id="points">0</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
